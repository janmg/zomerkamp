{% extends "base.html" %}
{% block title %}Import CSV - Zomerkamp Super Version{% endblock %}
{% block content %}
<h2>Import Data</h2>
<p class="intro">Upload tasks and participants CSV files directly in the web app (app1 flow).</p>

<div class="grid">
  <div class="card">
    <h3>Tasks</h3>
    <form method="post" enctype="multipart/form-data" class="stack" style="margin-top: 0.8rem;">
      <input type="hidden" name="action" value="upload-tasks">
      <div>
        <label for="tasks_csv">Tasks CSV</label>
        <input id="tasks_csv" name="tasks_csv" type="file" accept=".csv" required>
      </div>
      <div><button type="submit">Upload Tasks</button></div>
    </form>
  </div>

  <div class="card">
    <h3>Participants</h3>
    <form method="post" enctype="multipart/form-data" class="stack" style="margin-top: 0.8rem;">
      <input type="hidden" name="action" value="upload-participants">
      <div>
        <label for="participants_csv">Participants CSV</label>
        <input id="participants_csv" name="participants_csv" type="file" accept=".csv" required>
      </div>
      <div><button type="submit">Upload Participants</button></div>
    </form>
  </div>
</div>
{% endblock %}
