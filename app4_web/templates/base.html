<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
  <title>{% block title %}Zomerkamp Super Version{% endblock %}</title>
  <style>
    :root {
      --bg: #f1ede4;
      --paper: #ffffff;
      --ink: #232323;
      --muted: #5f6368;
      --accent: #1a73e8;
      --accent-deep: #1457ad;
      --secondary: #0f9d58;
      --line: #dde3ea;
      --gold-line: #ffba00;
      --shadow: 0 10px 24px rgba(28, 40, 54, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Roboto", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fdfdfd 0 180px, var(--bg) 180px 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      left: 0;
      top: 180px;
      width: 100%;
      height: 8px;
      background: var(--gold-line);
      pointer-events: none;
      z-index: 0;
    }

    a {
      color: inherit;
    }

    header {
      padding: 2rem 1.25rem 1rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      max-width: 1180px;
      margin: 0 auto;
      background: linear-gradient(120deg, #ffffff 0%, #f7fbff 52%, #f2f8ff 100%);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand-logo {
      width: clamp(58px, 9vw, 88px);
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      background: #fff;
    }

    .brand-copy {
      min-width: 0;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.01em;
      color: var(--accent-deep);
    }

    .hero p {
      margin-top: 0.4rem;
      max-width: 60ch;
      color: var(--muted);
    }

    nav {
      margin-top: 1rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      padding: 0.65rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(26, 115, 232, 0.22);
      background: #f4f9ff;
      color: var(--accent-deep);
      font-weight: 500;
      transition: transform 120ms ease, background 120ms ease;
    }

    nav a:hover,
    nav a.active {
      transform: translateY(-1px);
      background: #e7f1ff;
      border-color: rgba(26, 115, 232, 0.45);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1rem 1.25rem 2rem;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1.4rem;
      animation: fade-in-up 260ms ease;
    }

    .panel > * + * {
      border-top: 1px solid var(--line);
      margin-top: 1rem;
      padding-top: 1rem;
    }

    h2 {
      font-size: 1.6rem;
      margin-bottom: 0.35rem;
    }

    .intro {
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .stat {
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
    }

    .stat strong {
      display: block;
      font-size: 2rem;
      color: var(--accent-deep);
    }

    .stat span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .card {
      display: block;
      text-decoration: none;
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.2rem;
      min-height: 180px;
      box-shadow: 0 6px 16px rgba(28, 40, 54, 0.06);
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(20, 87, 173, 0.12);
      border-color: rgba(20, 87, 173, 0.38);
    }

    .card-kicker {
      color: var(--secondary);
      font-size: 0.82rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card h3 {
      font-size: 1.45rem;
      margin: 0.55rem 0;
    }

    .card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .person-card,
    .day-block {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .person-header,
    .day-header {
      background: linear-gradient(90deg, rgba(26, 115, 232, 0.1), rgba(26, 115, 232, 0.02));
      padding: 0.95rem 1.1rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .pts {
      background: rgba(20, 87, 173, 0.1);
      color: var(--accent-deep);
      border-radius: 999px;
      padding: 0.3rem 0.7rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th,
    td {
      text-align: left;
      padding: 0.85rem 0.9rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #f7fbff;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge-lead {
      background: rgba(26, 115, 232, 0.14);
      color: var(--accent-deep);
    }

    .badge-helper {
      background: rgba(15, 157, 88, 0.16);
      color: var(--secondary);
    }

    .badge-backup {
      background: rgba(95, 99, 104, 0.16);
      color: #4d5258;
    }

    .quiet {
      color: var(--muted);
    }

    .empty {
      padding: 1rem 1.1rem;
      color: var(--muted);
      font-style: italic;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      main,
      header {
        padding-left: 0.85rem;
        padding-right: 0.85rem;
      }

      .panel {
        padding: 1rem;
      }

      th,
      td {
        padding: 0.7rem 0.65rem;
      }

      .hero {
        padding: 1.1rem;
      }

      .brand-logo {
        width: 58px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <div class="hero-top">
        <div class="brand">
          <img src="{{ url_for('static', filename='polaris.png') }}" alt="Polaris logo" class="brand-logo">
          <div class="brand-copy">
            <h1>Zomerkamp Super Version</h1>
            <p>One merged roster system combining the stronger admin and scheduling flow with the richer data capture and web navigation from both earlier versions.</p>
          </div>
        </div>
      </div>
      <nav>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
        <a href="/leaderboard" {% if request.path == '/leaderboard' %}class="active"{% endif %}>Leaderboard</a>
        <a href="/schedule" {% if request.path == '/schedule' %}class="active"{% endif %}>Schedule</a>
        <a href="/master" {% if request.path == '/master' %}class="active"{% endif %}>Master Sheet</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="panel">
      {% block content %}{% endblock %}
    </section>
  </main>
</body>
</html>
